name: Build Windows executable and release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build
        run: python setup.py build_exe -b slicebug-release

      - name: Zip release
        shell: pwsh
        run: Compress-Archive -Path slicebug-release\* -DestinationPath slicebug-windows.zip -Force

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload $env:RELEASE_TAG slicebug-windows.zip --clobber

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: slicebug-windows
          path: slicebug-windows.zip
